name: ANF to Pushover

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check-anf:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check ANF RSS and send to Pushover
        env:
          PUSHOVER_USER: ${{ secrets.PUSHOVER_USER }}
          PUSHOVER_TOKEN: ${{ secrets.PUSHOVER_TOKEN }}
        run: python3 check_anf.py
      - name: Save last seen
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add last_seen.txt
          git diff --cached --quiet && echo "Degisiklik yok" || git commit -m "Update last seen ANF item"
          git push || true
